<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Нет соединения — HR-помощник</title>
  <style>
    :root { --blue: #1e40af; --ink: #0f172a; --muted: #64748b; --bg: #f1f5f9; }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; }
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg); color: var(--ink);
      display: flex; align-items: center; justify-content: center; padding: 24px;
    }
    .card {
      max-width: 420px; text-align: center;
      background: #fff; border: 1px solid #e2e8f0; border-radius: 20px;
      padding: 36px 28px; box-shadow: 0 20px 50px rgba(15, 23, 42, 0.1);
    }
    .icon {
      width: 68px; height: 68px; margin: 0 auto 18px; border-radius: 18px;
      background: linear-gradient(135deg, #3b82f6, var(--blue));
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-size: 30px; font-weight: 800;
    }
    h1 { font-size: 20px; margin: 0 0 8px; }
    p { color: var(--muted); font-size: 15px; line-height: 1.55; margin: 0 0 22px; }
    button {
      border: none; border-radius: 999px; padding: 11px 22px; cursor: pointer;
      background: var(--blue); color: #fff; font-size: 15px; font-weight: 600;
    }
    button:hover { background: #1e3a8a; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">HR</div>
    <h1>Нет подключения к интернету</h1>
    <p>Не удалось загрузить страницу. Проверьте соединение — как только сеть появится, обновите страницу.</p>
    <button onclick="location.reload()">Обновить</button>
  </div>
</body>
</html>
